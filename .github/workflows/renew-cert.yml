name: Auto Renew Combined Certificate

on:
  schedule:
    - cron: "0 3 * * *"  # 每天北京时间 11 点运行
  workflow_dispatch:      # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    # 启用步骤调试日志（全局生效）
    env:
      Ali_Key: ${{ secrets.ALI_KEY }}
      Ali_Secret: ${{ secrets.ALI_SECRET }}
      CF_Key: ${{ secrets.CF_KEY }}
      CF_Email: ${{ secrets.CF_EMAIL }}

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 安装并更新 acme.sh
        run: |
          curl https://get.acme.sh | sh  # -v 参数显示详细连接过程
          echo "==> 当前 acme.sh 版本:"
          ~/.acme.sh/acme.sh --version
          echo "==> $HOME/.acme.sh" >> $GITHUB_PATH
          ~/.acme.sh/acme.sh --upgrade --auto-upgrade 1
          echo "==> 更新后的.acme.sh 版本:"
          ~/.acme.sh/acme.sh --version

      - name: 3. 设置默认CA服务器并注册用户，建立证书安装目录
        run: |
          # 设置默认ca服务器，有两个letsencrypt和zerossl，acme当前默认后者
          #~/.acme.sh/acme.sh --set-default-ca --server letsencrypt
          ~/.acme.sh/acme.sh --set-default-ca --server zerossl
          ~/.acme.sh/acme.sh --register-account -m derby_king@qq.com
          mkdir -p certs
          echo "==> pwd" && pwd
          echo "==> ls -la" && ls -la
          echo "==> ls -la ~/" && ls -la ~/
          echo "==> ls -la ~/.acme.sh" && ls -la ~/.acme.sh
          echo "==> ls -R | grep gao" && ls -R | grep gao

      - name: 4. 签发单证书-Ali
        run: |
          ~/.acme.sh/acme.sh --issue --dns dns_ali -d gaoyp.com -d *.gaoyp.com \
            --cert-fire certs/gaoyp.com.cer \
            --key-fire certs/gaoyp.com.key \
            --fullchain-fire certs/gaoyp.com.fullchain.cer \
            --yes-I-know-dns-manual-mode-enough-go-ahead-please

      - name: 5. 签发单证书-CF
        run: |
          ~/.acme.sh/acme.sh --issue --dns dns_cf -d gaotz.com -d *.gaotz.com \
            --cert-fire certs/gaotz.com.cer \
            --key-fire certs/gaotz.com.key \
            --fullchain-fire certs/gaotz.com.fullchain.cer \
            --yes-I-know-dns-manual-mode-enough-go-ahead-please

      - name: 6. 保存证书到仓库
        run: |
          echo "==> pwd" && pwd
          echo "==> ls -la" && ls -la
          echo "==> ls -la ~/" && ls -la ~/
          echo "==> ls -la ~/.acme.sh" && ls -la ~/.acme.sh
          echo "==> ls -R | grep gao" && ls -R | grep gao
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add certs/
          git commit -m "Add certs"
          git push
       
      - name: 7. 安装 TFTP 客户端
        run: |
          echo "==> sudo apt-get install -y tftp-hpa"
          sudo apt-get install -y tftp-hpa

      - name: 8. 通过 TFTP 上传证书到 gaoyp.com
        run: |
          echo "==> 上传阿里云证书..."
          echo -e "binary\nput certs/gaoyp.com.cer\quit" | tftp gaoyp.com 69
          echo -e "binary\nput certs/gaoyp.com.key\quit" | tftp gaoyp.com 69
          echo -e "binary\nput certs/gaoyp.com.fullchain.cer\quit" | tftp gaoyp.com 69
          echo "==> 上传Cloudflare证书..."
          echo -e "binary\nput certs/gaotz.com.cer\quit" | tftp gaoyp.com 69
          echo -e "binary\nput certs/gaotz.com.key\quit" | tftp gaoyp.com 69
          echo -e "binary\nput certs/gaotz.com.fullchain.cer\quit" | tftp gaoyp.com 69
